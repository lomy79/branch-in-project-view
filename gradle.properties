# The Kotlin stdlib is already provided by the IDE: do not bundle it in the plugin.
kotlin.stdlib.default.dependency=false

org.gradle.jvmargs=-Xmx2g
org.gradle.caching=true

# Where to find the JDK 21 for the compilation toolchain.
org.gradle.java.installations.paths=/usr/lib/jvm/java-21-amazon-corretto
